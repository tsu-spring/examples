spring.application.name=imdb
server.servlet.context-path=/imdb

spring.freemarker.settings.number_format=0.##

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.web.resources.static-locations=classpath:/static/, file:${imdb.posters.folder}
logging.level.ge.edu.sangu.imdb=DEBUG

# Custom variable
imdb.posters.folder=imdb-posters